name: Build Fabric Mod
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download Official Fabric Template
        run: |
          # Клонируем чистый официальный шаблон Fabric Mod
          git clone --depth 1 https://github.com template
          
          # Очищаем дефолтные исходники шаблона
          rm -rf template/src/main/java/*
          
          # Копируем идеальные файлы сборщика в корень
          cp template/build.gradle .
          cp template/settings.gradle .
          cp template/gradle.properties .
          cp -r template/gradle .
          cp template/gradlew .

      - name: Configure Versions for 1.21.11
        run: |
          # Жестко прописываем официальные версии для Minecraft 1.21.11
          cat << 'EOF' > gradle.properties
          minecraft_version=1.21.11
          yarn_mappings=1.21.11+build.1
          loader_version=0.16.10
          mod_version=1.0.0
          mod_group=com.mod.ahsell
          mod_id=ahsell
          EOF

      - name: Unzip project code
        run: |
          # Распаковываем ваши файлы кода поверх структуры
          unzip -o "ahsell-mod (1).zip" -d .

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Fabric Jar
        run: ./gradlew build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fabric-Mod-1.21.11-Jar
          path: build/libs/*.jar
          
